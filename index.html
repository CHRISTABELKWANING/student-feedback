<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Student Feedback</title>
</head>
<body>
    <!--heading-->
    <div class="container">
        <h1>Student Feedback Form</h1>
        <div class="heading-line">
           <span></span>
           <div class="dot"></div>
          <span></span>
        </div>
        <p class="hp">Please help us improve our course by filling out this form.</p>
        <!--Forms-->
        <form action="/submit-feedback" method="POST" id="feedbackForm">
           <div>
             <label for="name">Name:</label><br>
             <input type="text" id="name" name="name" required />
           </div><br>

            <div>
                <label for="instructor-name">Instructor</label><br>
                <input type="text" id="instructorName" name="instructorName" placeholder="Enter instructor's name" />
            </div><br>

            <div>
               <label for="course">Course</label><br>
               <input type="text" id="course" name="course" required />
            </div><br>

        <p>Why did you choose this course?</p>
        <div>
            <label for="reason">Please explain:</label><br>
            <textarea id="feedback" name="feedback" rows="4" cols="50" placeholder="Enter yor feedback" required></textarea>
    
        </div><br>

        <p>How satisfied are you with the course?</p>
        <div>
            <label for="satisfaction">Select one:</label>
            <select id="satisfaction" name="satisfaction" required>
                <option value="">Select an option</option>
                <option value="very-satisfied">Very Satisfied</option>
                <option value="satisfied">Satisfied</option>
                <option value="neutral">Neutral</option>
                <option value="dissatisfied">Dissatisfied</option>
                <option value="very-dissatisfied">Very Dissatisfied</option>
            </select>
        </div><br>

        <p>Would you recommend this course to other students?</p>
        <div>
              <input type="radio" id="recommend-yes" name="recommend-yes" value="yes" required />
             <label for="recommend-yes">Yes</label>

             <input type="radio" id="recommend-no" name="recommend-no" value="no" required />
             <label for="recommend-no">No</label>
        <div><br>
            
         <button type="submit" class="btn">Submit Feedback</button>

        </form>
    </div>
<script src="main.js"></script>
</body>
</html>
